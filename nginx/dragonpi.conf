# ======================================================================
#  DragonPi Nginx Configuration
#  Custom dashboard engine (Flask chatbot) on port 80
#  Access: http://dragonpi.local
# ======================================================================

server {
    listen 80;
    listen [::]:80;
    server_name dragonpi.local dragonpi _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/xml+rss
               application/json image/svg+xml;

    # ── Main dashboard + all app routes → Flask chatbot (:5000) ──
    # The chatbot serves: / (dashboard), /chat, /podcast, /launch,
    # /api/*, /rss/feed, /term/<tool>, /new-session, /status.
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffering off;
        proxy_cache off;
    }

    # Auto-refreshed dashboard screenshot (served as static file)
    location /screenshots/ {
        alias /opt/dragonpi/screenshots/;
        expires 5m;
        add_header Cache-Control "public";
    }

    # Deny hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Proxy DragonAI chatbot (OpenCode Go)
    location /chat {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffering off;
        proxy_cache off;
    }

    # RSS cyber feed proxy
    location /rss {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache off;
    }

    # Tool launcher proxy
    location /launch {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Podcast player (full page + /api/podcast* via /api block below)
    location /podcast {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # API endpoints (system monitor, threat intel, pentest, etc.)
    location /api {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache off;
    }

    # Pentest console (external + internal automated pentesting)
    location /pentest {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 600s;
        proxy_buffering off;
    }

    # Pentest report downloads (HTML, PDF, ZAP, raw JSON)
    location /reports/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
        # Allow large PDF downloads
        proxy_buffering on;
    }

    # One-click terminal spawner
    location /term {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Proxy ttyd web terminal (optional — also directly on :7681)
    location /terminal/ {
        proxy_pass http://127.0.0.1:7681/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Proxy Kismet web UI (read-only access)
    location /kismet/ {
        proxy_pass http://127.0.0.1:2501/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Proxy Autopsy Forensic Browser (runs on 127.0.0.1:9999 only).
    # Autopsy 2.24 hardcodes localhost:9999 in redirects/HTML, so we rewrite
    # those to host-relative URLs so the browser stays on port 80 via nginx.
    location /autopsy {
        proxy_pass http://127.0.0.1:9999;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        # Rewrite redirect Location headers pointing at localhost:9999
        proxy_redirect http://localhost:9999/ /;
        proxy_redirect http://127.0.0.1:9999/ /;
        # Rewrite absolute URLs in HTML/JS/CSS bodies to host-relative
        sub_filter 'http://localhost:9999' '';
        sub_filter 'http://127.0.0.1:9999' '';
        sub_filter_once off;
        sub_filter_types text/css application/javascript text/javascript;
    }

    # Logs
    access_log /var/log/nginx/dragonpi-access.log;
    error_log /var/log/nginx/dragonpi-error.log;
}

