<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎙️ Podcast Player — DragonPi</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0d0b; --bg2:#0f1411; --bg3:#151c17; --bg4:#1a2418;
  --border:#1a281f; --border2:#2a4a32;
  --text:#c8d6cc; --text2:#6b8a74; --text3:#4a6353;
  --green:#4ade80; --green2:#22c55e; --amber:#f59e0b; --red:#ef4444; --cyan:#22d3ee;
  --font:'JetBrains Mono','SF Mono','Fira Code','Consolas','Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji',monospace;
  --radius:6px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  background:var(--bg);
  background-image:linear-gradient(rgba(74,222,128,0.012) 1px,transparent 1px);
  background-size:100% 3px;
  color:var(--text);font-family:var(--font);font-size:14px;
  display:flex;flex-direction:column;overflow:hidden;
}

/* Header */
.header{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:8px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0;
}
.header .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.header .dot.r{background:#ef4444}.header .dot.y{background:#f59e0b}.header .dot.g{background:#22c55e}
.header .title{color:var(--text2);font-size:.8em;letter-spacing:.04em;margin-left:6px}
.header .title span{color:var(--green);font-weight:600}
.header-right{margin-left:auto;display:flex;gap:6px;align-items:center}
.header-right a button,.header-right button{
  background:var(--bg3);border:1px solid var(--border);color:var(--text2);
  padding:5px 10px;border-radius:var(--radius);cursor:pointer;
  font-size:.75em;font-family:var(--font);transition:all .15s;
}
.header-right a button:hover,.header-right button:hover{background:var(--border);color:var(--green);border-color:var(--border2)}

/* App layout */
.app{flex:1;display:flex;min-height:0}

/* Sidebar — podcast list */
.sidebar{
  width:230px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.sidebar h3{
  font-size:.7em;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;
  padding:14px 16px 8px;font-weight:600;
}
.pod-list{flex:1;overflow-y:auto;padding:0 8px 12px}
.pod-list::-webkit-scrollbar{width:5px}
.pod-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.pod-item{
  display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--radius);
  cursor:pointer;color:var(--text2);transition:all .15s;margin-bottom:2px;
}
.pod-item i{width:16px;text-align:center;font-size:.95em;flex-shrink:0}
.pod-item .nm{flex:1;font-size:.82em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pod-item .cnt{font-size:.65em;color:var(--text3);flex-shrink:0}
.pod-item:hover{background:var(--bg3);color:var(--text)}
.pod-item.active{background:var(--bg4);color:var(--green);border:1px solid var(--border2)}
.pod-item.active .cnt{color:var(--green2)}

/* Main */
.main{flex:1;display:flex;flex-direction:column;min-width:0}

/* Now playing + player */
.player-wrap{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:14px 20px 16px;flex-shrink:0;
}
.np-podcast{font-size:.7em;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.np-title{font-size:1.05em;color:var(--text);font-weight:600;line-height:1.3;margin-bottom:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.np-meta{font-size:.72em;color:var(--text2);display:flex;gap:10px;align-items:center;margin-bottom:12px}
.np-meta .badge{background:var(--bg4);color:var(--green2);padding:1px 7px;border-radius:10px;font-size:.9em}
.np-meta .pos{color:var(--text3)}

/* controls row */
.controls{display:flex;align-items:center;gap:10px}
.ctrl-btn{
  background:var(--bg3);border:1px solid var(--border);color:var(--text2);
  width:34px;height:34px;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:.85em;
  transition:all .15s;flex-shrink:0;
}
.ctrl-btn:hover{background:var(--border);color:var(--green);border-color:var(--border2)}
.ctrl-btn:disabled{opacity:.3;cursor:not-allowed}
.ctrl-btn.play{
  background:var(--green);color:#0a0d0b;width:44px;height:44px;font-size:1.05em;border:none;
}
.ctrl-btn.play:hover{background:var(--green2);color:#0a0d0b}
.ctrl-btn.nav{width:auto;border-radius:var(--radius);padding:0 12px;gap:6px;font-size:.78em;letter-spacing:.02em}
.ctrl-btn.nav i{font-size:.85em}

/* seek bar */
.seek-wrap{flex:1;display:flex;flex-direction:column;gap:5px;min-width:0}
.seek-row{display:flex;align-items:center;gap:10px}
.seek{
  flex:1;-webkit-appearance:none;appearance:none;height:5px;border-radius:3px;
  background:var(--border);outline:none;cursor:pointer;min-width:0;
}
.seek::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;width:13px;height:13px;border-radius:50%;
  background:var(--green);cursor:pointer;border:2px solid var(--bg2);box-shadow:0 0 0 1px var(--green);
}
.seek::-moz-range-thumb{width:13px;height:13px;border-radius:50%;background:var(--green);cursor:pointer;border:2px solid var(--bg2)}
.seek:disabled{opacity:.5}
.time{font-size:.72em;color:var(--text2);font-variant-numeric:tabular-nums;white-space:nowrap}
.time .cur{color:var(--green)}

/* secondary row: speed + volume + link */
.controls-2{display:flex;align-items:center;gap:14px;margin-top:10px;flex-wrap:wrap}
.speed{display:flex;gap:2px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:2px}
.speed button{
  background:transparent;border:none;color:var(--text3);font-family:var(--font);
  font-size:.72em;padding:3px 8px;border-radius:3px;cursor:pointer;
}
.speed button:hover{color:var(--text2)}
.speed button.on{background:var(--bg4);color:var(--green)}
.vol{display:flex;align-items:center;gap:6px}
.vol i{color:var(--text2);font-size:.8em}
.vol input{
  width:80px;-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;
  background:var(--border);outline:none;cursor:pointer;
}
.vol input::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:11px;height:11px;border-radius:50%;background:var(--green);cursor:pointer}
.vol input::-moz-range-thumb{width:11px;height:11px;border-radius:50%;background:var(--green);cursor:pointer;border:none}
.ext-link{margin-left:auto;font-size:.72em;color:var(--text3);text-decoration:none}
.ext-link:hover{color:var(--green)}

/* Episodes */
.ep-header{
  padding:12px 20px 8px;font-size:.7em;color:var(--text3);
  letter-spacing:.1em;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center;
  flex-shrink:0;
}
.ep-list{flex:1;overflow-y:auto;padding:0 12px 16px}
.ep-list::-webkit-scrollbar{width:6px}
.ep-list::-webkit-scrollbar-track{background:var(--bg)}
.ep-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.ep-list::-webkit-scrollbar-thumb:hover{background:var(--border2)}

.ep{
  display:flex;gap:12px;padding:11px 12px;border-radius:var(--radius);cursor:pointer;
  border:1px solid transparent;margin-bottom:4px;transition:all .12s;align-items:flex-start;
}
.ep:hover{background:var(--bg3);border-color:var(--border)}
.ep.current{background:var(--bg4);border-color:var(--border2)}
.ep-play{
  width:30px;height:30px;border-radius:50%;background:var(--bg);border:1px solid var(--border);
  color:var(--green);display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:.8em;transition:all .15s;
}
.ep:hover .ep-play,.ep.current .ep-play{background:var(--green);color:#0a0d0b;border-color:var(--green)}
.ep-body{flex:1;min-width:0}
.ep-title{font-size:.85em;color:var(--text);line-height:1.35;margin-bottom:3px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ep.current .ep-title{color:var(--green)}
.ep-meta{font-size:.68em;color:var(--text3);display:flex;gap:10px;align-items:center}
.ep-meta .dur{color:var(--text2)}
.ep-meta .new{color:var(--amber);font-weight:600}
.ep-progress{
  width:30px;height:30px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:.6em;color:var(--green2);font-variant-numeric:tabular-nums;
}

/* states */
.state-msg{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:var(--text3);gap:10px;padding:40px;
}
.state-msg .big{font-size:2.4em;opacity:.5}
.state-msg .txt{font-size:.85em}
.state-msg.error .big{color:var(--red)}
.state-msg.error .txt{color:var(--red)}

/* mini spinner */
.spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* responsive */

/* Tablet (≤720px) */
@media(max-width:720px){
  .sidebar{width:64px}
  .sidebar h3,.pod-item .nm,.pod-item .cnt{display:none}
  .pod-item{justify-content:center;padding:11px 8px}
  .player-wrap{padding:12px 14px}
  .controls{flex-wrap:wrap}
  .ctrl-btn.nav span{display:none}
}

/* Mobile (≤640px) */
@media(max-width:640px){
  body{font-size:13px}
  .header{padding:8px 12px;gap:6px}
  .header .title{font-size:.72em}
  .header-right{gap:4px}
  .header-right a button,.header-right button{padding:5px 8px;font-size:.7em}
  /* App becomes a single column — sidebar on top as horizontal scroll bar */
  .app{flex-direction:column}
  .sidebar{
    width:100%;max-height:none;flex-shrink:0;
    border-right:none;border-bottom:1px solid var(--border);
  }
  .sidebar h3{padding:10px 14px 4px;font-size:.65em}
  .pod-list{
    display:flex;flex-direction:row;padding:0 8px 10px;gap:6px;
    overflow-x:auto;max-height:none;
  }
  .pod-item{flex-shrink:0;padding:8px 12px;margin:0;min-width:auto}
  .pod-item .nm{display:block;font-size:.72em}  /* show names in scroll bar */
  .pod-item .cnt{display:none}
  /* Player controls compact */
  .player-wrap{padding:10px 12px;flex-shrink:0}
  .np-title{font-size:.9em}
  .np-meta{font-size:.64em;gap:6px;flex-wrap:wrap}
  .controls{gap:6px}
  .ctrl-btn{width:34px;height:34px}
  .ctrl-btn.play{width:42px;height:42px}
  .ctrl-btn.nav{padding:0 10px}
  .ctrl-btn.nav span{display:inline}      /* keep Back/Next text on phones */
  .seek-wrap{flex:1 1 100%;order:3;margin-top:8px}
  .controls-2{gap:10px;margin-top:8px;flex-wrap:wrap}
  .vol input{width:60px}
  /* Episodes take remaining height */
  .main{flex:1;min-height:0}
  .ep-header{padding:10px 12px 6px;font-size:.66em}
  .ep-list{padding:0 8px 12px}
  .ep{padding:10px 10px;gap:10px}
  .ep-title{font-size:.8em;-webkit-line-clamp:2}
  .ep-meta{font-size:.62em;flex-wrap:wrap;gap:6px}
  .ep-play{width:30px;height:30px}
  .ep-progress{width:30px;height:30px}
}

/* Small phones (≤400px) */
@media(max-width:400px){
  .ctrl-btn.nav span{display:none}     /* icon only on tiny phones */
  .ctrl-btn.nav{padding:0 8px}
  .speed button{padding:3px 6px;font-size:.66em}
  .controls-2{flex-direction:column;align-items:flex-start;gap:8px}
  .vol{width:100%}
}
</style>
</head>
<body>

<div class="header">
  <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
  <span class="title"><span>dragonpi</span>:/podcast — 🎙️ player</span>
  <div class="header-right">
    <a href="/chat"><button><i class="fas fa-robot"></i> chat</button></a>
    <a href="/"><button><i class="fas fa-th"></i> dashboard</button></a>
  </div>
</div>

<div class="app">
  <aside class="sidebar">
    <h3>Podcasts</h3>
    <div class="pod-list" id="podList"></div>
  </aside>

  <main class="main">
    <div class="player-wrap">
      <div class="np-podcast" id="npPodcast">select a podcast</div>
      <div class="np-title" id="npTitle">—</div>
      <div class="np-meta" id="npMeta"></div>

      <div class="controls">
        <button class="ctrl-btn nav" id="btnPrev" onclick="navEpisode(-1)" disabled>
          <i class="fas fa-backward-step"></i><span>Back</span>
        </button>
        <button class="ctrl-btn" id="btnSkipBack" onclick="skip(-15)" title="Back 15s">
          <i class="fas fa-rotate-left"></i>
        </button>
        <button class="ctrl-btn play" id="btnPlay" onclick="togglePlay()" disabled>
          <i class="fas fa-play" id="playIcon"></i>
        </button>
        <button class="ctrl-btn" id="btnSkipFwd" onclick="skip(15)" title="Forward 15s">
          <i class="fas fa-rotate-right"></i>
        </button>
        <button class="ctrl-btn nav" id="btnNext" onclick="navEpisode(1)" disabled>
          <span>Next</span><i class="fas fa-forward-step"></i>
        </button>

        <div class="seek-wrap">
          <div class="seek-row">
            <span class="time"><span class="cur" id="curTime">0:00</span> / <span id="totTime">0:00</span></span>
            <input type="range" class="seek" id="seek" min="0" max="100" value="0" step="0.1" disabled
              oninput="seeking(this)" onchange="seekTo(this)">
          </div>
        </div>
      </div>

      <div class="controls-2">
        <div class="speed" id="speedCtl">
          <button onclick="setSpeed(1)" data-s="1">1x</button>
          <button onclick="setSpeed(1.25)" data-s="1.25">1.25x</button>
          <button onclick="setSpeed(1.5)" data-s="1.5">1.5x</button>
          <button onclick="setSpeed(1.75)" data-s="1.75">1.75x</button>
          <button onclick="setSpeed(2)" data-s="2">2x</button>
        </div>
        <div class="vol">
          <i class="fas fa-volume-high" id="volIcon"></i>
          <input type="range" id="volume" min="0" max="1" step="0.05" value="1" oninput="setVol(this.value)">
        </div>
        <a class="ext-link" id="extLink" href="#" target="_blank" style="display:none">
          <i class="fas fa-arrow-up-right-from-square"></i> episode page
        </a>
      </div>
    </div>

    <div class="ep-header">
      <span id="epHeader">Episodes</span>
      <span id="epCount"></span>
    </div>
    <div class="ep-list" id="epList">
      <div class="state-msg"><div class="big"><div class="spinner"></div></div><div class="txt">loading podcasts…</div></div>
    </div>
  </main>
</div>

<audio id="audio" preload="metadata"></audio>

<script>
const audio=document.getElementById('audio');
let pods=[],currentSlug=null,eps=[],currentIdx=-1,isLoading=false;

/* ── init ── */
(async function init(){
  audio.volume=1;
  audio.addEventListener('loadedmetadata',updateTimes);
  audio.addEventListener('timeupdate',onTimeUpdate);
  audio.addEventListener('ended',()=>{ /* auto-advance to next (older) episode */ if(currentIdx<eps.length-1) loadEpisode(currentIdx+1,true); });
  audio.addEventListener('play',()=>{document.getElementById('playIcon').className='fas fa-pause';});
  audio.addEventListener('pause',()=>{document.getElementById('playIcon').className='fas fa-play';});

  try{
    const r=await fetch('/api/podcasts');
    pods=await r.json();
  }catch(e){
    renderError('Could not load podcast list.');
    return;
  }
  renderSidebar();
  // ?p=<slug> from dashboard link → land on that show; else first podcast
  const qslug=new URLSearchParams(location.search).get('p');
  const start=pods.find(p=>p.slug===qslug)||pods[0];
  if(start) await selectPod(start.slug,true);   // load + play latest episode
})();

/* ── sidebar ── */
function renderSidebar(){
  const el=document.getElementById('podList');
  el.innerHTML='';
  pods.forEach(p=>{
    const d=document.createElement('div');
    d.className='pod-item'+(p.slug===currentSlug?' active':'');
    d.dataset.slug=p.slug;
    d.innerHTML=`<i class="${p.icon}"></i><span class="nm">${esc(p.name)}</span><span class="cnt">${p.count!=null?p.count:''}</span>`;
    d.onclick=()=>selectPod(p.slug,false);
    el.appendChild(d);
  });
}

/* ── select + load episodes ── */
async function selectPod(slug,autoplay){
  if(isLoading && currentSlug===slug) return;
  currentSlug=slug;
  renderSidebar();
  // active marker on sidebar
  document.querySelectorAll('.pod-item').forEach(d=>d.classList.toggle('active',d.dataset.slug===slug));

  const list=document.getElementById('epList');
  list.innerHTML='<div class="state-msg"><div class="big"><div class="spinner"></div></div><div class="txt">fetching episodes…</div></div>';
  document.getElementById('epHeader').textContent='Episodes';
  document.getElementById('epCount').textContent='';

  isLoading=true;
  try{
    const r=await fetch('/api/podcast/'+slug);
    const data=await r.json();
    if(!r.ok||data.error) throw new Error(data.error||('HTTP '+r.status));
    eps=data.episodes||[];
    const pod=pods.find(p=>p.slug===slug);
    document.getElementById('npPodcast').textContent=pod?pod.name:'podcast';
    renderEpisodes();
    if(eps.length){
      loadEpisode(0,autoplay);   // index 0 = latest episode
    }else{
      list.innerHTML='<div class="state-msg"><div class="big">∅</div><div class="txt">no episodes found</div></div>';
    }
  }catch(e){
    renderError(e.message);
  }finally{
    isLoading=false;
  }
}

/* ── episode list ── */
function renderEpisodes(){
  const list=document.getElementById('epList');
  document.getElementById('epCount').textContent=eps.length?eps.length+' episodes':'';
  if(!eps.length){list.innerHTML='';return;}
  list.innerHTML='';
  eps.forEach((ep,i)=>{
    const d=document.createElement('div');
    d.className='ep'+(i===currentIdx?' current':'');
    const isNew = i===0 ? '<span class="new">NEW</span>' : '';
    d.innerHTML=`
      <div class="ep-play"><i class="fas fa-play"></i></div>
      <div class="ep-body">
        <div class="ep-title">${esc(ep.title)}</div>
        <div class="ep-meta">
          <span>${esc(fmtDate(ep.published))}</span>
          ${isNew}
          <span class="dur">${esc(ep.duration||'')}</span>
        </div>
      </div>
      <div class="ep-progress" data-i="${i}"></div>`;
    d.onclick=()=>loadEpisode(i,true);
    list.appendChild(d);
  });
}

/* ── load an episode into the player ── */
function loadEpisode(idx,autoplay){
  if(idx<0||idx>=eps.length) return;
  currentIdx=idx;
  const ep=eps[idx];
  audio.src=ep.audio;
  audio.playbackRate=currentSpeed;
  audio.load();

  document.getElementById('npTitle').textContent=ep.title;
  document.getElementById('npPodcast').textContent=(pods.find(p=>p.slug===currentSlug)||{}).name||'';
  document.getElementById('npMeta').innerHTML=
    `<span class="badge">EP ${eps.length-idx}</span>`+
    `<span>${esc(fmtDate(ep.published))}</span>`+
    (ep.duration?`<span>· ${esc(ep.duration)}</span>`:'')+
    `<span class="pos">${idx+1} / ${eps.length}</span>`;

  const ext=document.getElementById('extLink');
  if(ep.link){ext.href=ep.link;ext.style.display='';}else{ext.style.display='none';}

  // enable controls
  document.getElementById('btnPlay').disabled=false;
  document.getElementById('seek').disabled=false;
  updateNavButtons();

  // highlight in list + scroll into view
  document.querySelectorAll('.ep').forEach((el,i)=>{
    el.classList.toggle('current',i===idx);
  });
  const cur=document.querySelectorAll('.ep')[idx];
  if(cur) cur.scrollIntoView({block:'nearest',behavior:'smooth'});

  if(autoplay){
    const p=audio.play();
    if(p&&p.catch)p.catch(()=>{ /* autoplay blocked — user clicks play */ });
  }
}

/* ── nav: +1 = next (older), -1 = back (newer) ── */
function navEpisode(dir){
  if(currentIdx<0) return;
  const ni=currentIdx+dir;
  if(ni<0||ni>=eps.length) return;
  loadEpisode(ni,true);
}
function updateNavButtons(){
  document.getElementById('btnPrev').disabled = currentIdx<=0;
  document.getElementById('btnNext').disabled = currentIdx<0 || currentIdx>=eps.length-1;
}

/* ── transport ── */
function togglePlay(){ if(audio.paused){audio.play().catch(()=>{});} else {audio.pause();} }
function skip(sec){ if(!audio.duration) return; audio.currentTime=Math.max(0,Math.min(audio.duration,audio.currentTime+sec)); }
let isSeeking=false;
function seeking(el){ isSeeking=true; if(audio.duration){ document.getElementById('curTime').textContent=fmtTime(audio.duration*el.value/100); } }
function seekTo(el){ if(audio.duration){ audio.currentTime=audio.duration*el.value/100; } isSeeking=false; }
function onTimeUpdate(){
  if(isSeeking) return;
  const cur=audio.currentTime||0, tot=audio.duration||0;
  const el=document.getElementById('seek');
  if(tot){ el.value=(cur/tot)*100; }
  document.getElementById('curTime').textContent=fmtTime(cur);
  document.getElementById('totTime').textContent=fmtTime(tot);
  // episode list progress
  document.querySelectorAll('.ep-progress').forEach((p,i)=>{
    if(i===currentIdx && tot){ const pct=Math.round((cur/tot)*100); p.textContent=pct>0?pct+'%':''; }
    else if(i!==currentIdx){ p.textContent=''; }
  });
}
function updateTimes(){
  document.getElementById('totTime').textContent=fmtTime(audio.duration||0);
  document.getElementById('seek').disabled=!audio.duration;
}

/* ── speed + volume ── */
let currentSpeed=1;
function setSpeed(s){
  currentSpeed=s; audio.playbackRate=s;
  document.querySelectorAll('#speedCtl button').forEach(b=>b.classList.toggle('on',b.dataset.s==String(s)));
}
function setVol(v){
  audio.volume=parseFloat(v);
  const i=document.getElementById('volIcon');
  i.className = audio.volume===0?'fas fa-volume-xmark':(audio.volume<0.5?'fas fa-volume-low':'fas fa-volume-high');
}

/* ── helpers ── */
function fmtTime(sec){
  sec=Math.max(0,Math.floor(sec||0));
  const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;
  return h?`${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`:`${m}:${String(s).padStart(2,'0')}`;
}
function fmtDate(s){
  if(!s) return '';
  const d=new Date(s);
  if(isNaN(d)) return s.slice(0,10);
  return d.toLocaleDateString(undefined,{year:'numeric',month:'short',day:'numeric'});
}
function esc(t){const d=document.createElement('div');d.textContent=t==null?'':t;return d.innerHTML;}
function renderError(msg){
  document.getElementById('epList').innerHTML=
    `<div class="state-msg error"><div class="big"><i class="fas fa-triangle-exclamation"></i></div><div class="txt">${esc(msg)}</div></div>`;
}

/* keyboard shortcuts */
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT') return;
  if(e.code==='Space'){e.preventDefault();togglePlay();}
  else if(e.code==='ArrowRight'&&e.shiftKey){navEpisode(1);}
  else if(e.code==='ArrowLeft'&&e.shiftKey){navEpisode(-1);}
  else if(e.code==='ArrowRight'){skip(15);}
  else if(e.code==='ArrowLeft'){skip(-15);}
});
setSpeed(1);
</script>
</body>
