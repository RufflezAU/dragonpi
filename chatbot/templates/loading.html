<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DragonPi — Launching Terminal</title>
<style>
:root{--bg:#0a0d0b;--bg2:#0f1411;--border:#1a281f;--text:#c8d6cc;--green:#4ade80;--font:monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font);display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:32px 40px;text-align:center;max-width:420px}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
h1{color:var(--green);font-size:1.1em;margin-bottom:4px}
p{color:#6b8a74;font-size:0.85em}
.status{color:var(--text);font-size:0.8em;margin-top:16px;font-family:var(--font)}
.error{color:#ef4444}
</style>
</head>
<body>
<div class="card">
  <div class="spinner"></div>
  <h1 id="title">Launching Terminal</h1>
  <p id="subtitle">Starting tool session...</p>
  <div class="status" id="status"></div>
</div>
<script>
const port = {{ port }};
const tool = "{{ tool }}";

document.getElementById('title').textContent = tool;
document.getElementById('subtitle').textContent = 'Spawning terminal session...';
document.getElementById('status').textContent = 'connecting to port ' + port + '...';

let attempts = 0;
function check(){
  attempts++;
  document.getElementById('status').textContent = 'connecting... (' + attempts + '/20)';

  const base = window.location.protocol + '//' + window.location.hostname;

  fetch(base + ':' + port + '/', {mode:'no-cors'})
    .then(() => {
      document.getElementById('status').textContent = 'ready! loading...';
      window.location.href = base + ':' + port;
    })
    .catch(() => {
      if(attempts < 20){
        setTimeout(check, 500);
      } else {
        document.getElementById('status').innerHTML = '<span class=error>Timed out. The terminal may need a moment.</span><br><br><a href=' + base + ':' + port + ' style=color:#4ade80>Open manually →</a>';
      }
    });
}

setTimeout(check, 800);
</script>
</body>
</html>
