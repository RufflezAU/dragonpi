<style>
#dragonpi-cves{max-width:1200px;margin:0 auto 20px;padding:0 20px}
#dragonpi-cves h3{color:#e0e8e2;font-size:1.2em;margin:20px 0 10px;font-weight:600}
#cve-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
#cve-grid .cve-card{background:#0f1411;border:1px solid #1a281f;border-radius:6px;padding:12px 16px;font-family:monospace;transition:all .2s}
#cve-grid .cve-card:hover{border-color:#2a4a32;box-shadow:0 2px 12px rgba(74,222,128,0.06)}
#cve-grid .cid{color:#f59e0b;font-weight:700;font-size:13px}
#cve-grid .score{color:#ef4444;font-size:20px;font-weight:700;float:right}
#cve-grid .desc{color:#6b8a74;font-size:11px;margin-top:6px;line-height:1.4;clear:both}
#cve-grid a{color:#4ade80;text-decoration:none;font-size:10px;display:inline-block;margin-top:6px}
#cve-grid a:hover{color:#7cf5a4}
</style>
</div>


  <style>
#rss-top{position:fixed;top:0;left:0;right:0;z-index:9999;background:#0a0d0b;border-bottom:1px solid #1a281f;height:24px;overflow:hidden;font-family:monospace;font-size:11px;line-height:24px;white-space:nowrap}
#rss-top .track{display:inline-block;animation:scroll 360s linear infinite;padding-left:100%}
#rss-top span{margin-right:30px;color:#6b8a74}
#rss-top .src{color:#4ade80;font-weight:700}
#rss-top a{color:#c8d6cc;text-decoration:none}
#rss-top a:hover{color:#4ade80}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}
#rss-top:hover .track{animation-play-state:paused}
body{padding-top:24px!important}
</style>
<div id=rss-top><div class=track id=rss-track>loading...</div></div>
<script>
(function load(){fetch("/rss/feed").then(r=>r.json()).then(d=>{var h="";d.forEach(function(i){h+='<span><b class=src>'+i.source+'</b> <a href="'+i.link+'" target=_blank>'+i.title.substring(0,90)+'</a></span>'});document.getElementById("rss-track").innerHTML=h})})();
setInterval(function(){fetch("/rss/feed").then(r=>r.json()).then(d=>{var h="";d.forEach(function(i){h+="<span><b class=src>"+i.source+"</b> <a href='+i.link+' target=_blank>"+i.title.substring(0,90)+"</a></span>"});document.getElementById("rss-track").innerHTML=h})},600000);
</script>
<style>
#cve-panel{position:fixed;top:24px;right:10px;z-index:9998;background:#0f1411;border:1px solid #1a281f;border-radius:6px;padding:10px 14px;width:280px;max-height:50vh;overflow-y:auto;font-family:monospace;font-size:11px}
#cve-panel h4{color:#4ade80;font-size:10px;margin:0 0 6px;text-transform:uppercase;letter-spacing:.05em}
#cve-panel .item{margin:3px 0;line-height:1.4}
#cve-panel .item .id{color:#f59e0b;font-weight:700}
#cve-panel .item .score{color:#ef4444;font-size:10px}
#cve-panel .item a{color:#c8d6cc;text-decoration:none;font-size:10px}
#cve-panel .item a:hover{color:#4ade80}
#cve-panel .item .desc{color:#6b8a74;font-size:10px}
#cve-panel-toggle{position:fixed;top:24px;right:290px;z-index:9999;background:#0f1411;border:1px solid #1a281f;color:#4ade80;padding:3px 6px;border-radius:3px 0 0 3px;cursor:pointer;font-family:monospace;font-size:9px;writing-mode:vertical-lr}
#cve-panel.collapsed{width:0;padding:0;overflow:hidden;border:none}
#cve-panel-toggle.collapsed{right:0;border-radius:3px}
</style>
